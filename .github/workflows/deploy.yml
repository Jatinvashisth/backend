name: Deploy FastAPI to EC2 via ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: fastapi-app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # all

    # 1. Checkout code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. AWS credentials configure
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    # 3. Login to ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Build Docker image
    - name: Build Docker Image
      run: docker build -t $ECR_REPOSITORY .

    # 5. Tag image
    - name: Tag Image
      run: |
        docker tag $ECR_REPOSITORY:latest \
        ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

    # 6. Push image to ECR
    - name: Push Image to ECR
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

    # 7. Deploy on EC2
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          aws ecr get-login-password --region us-east-2 \
          ocker login --username AWS \
          --password-stdin ${{ steps.login-ecr.outputs.registry }}

          docker pull ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

          docker stop fastapi-app || true
          docker rm fastapi-app || true

          docker run -d \
          --name fastapi-app \
          -p 8000:8000 \
          ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest




          